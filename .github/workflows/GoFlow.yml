name: Golang workflow
on:
  push:
    branches[master]
  pull_request:
    branches: [master]

jobs:
  Golang:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: janeausten123
          MYSQL_DATABASE: theinfinitelibrary
        ports:
          - 3306:3306

    steps:
      - name: Test editing distance
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          go-version-file: 'go.mod'
        run: go test
        




